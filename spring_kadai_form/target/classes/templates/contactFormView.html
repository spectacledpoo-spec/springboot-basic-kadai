<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>問い合わせフォーム課題のページ</title>
<style>
    .form-group {
      display: flex; /* 横並びにする */
      margin-bottom: 10px; /* 下に余白 */
    }
    label {
      width: 150px; /* ラベルの横幅を固定（ここがポイント！） */
      display: block; /* 縦幅を持たせるため */
    }
    .input-container {
      flex: 1; /* 残りのスペースを全て使う */
    }
    /* inputやtextarea自体の幅も調整 */
    input[type="text"], textarea {
      width: 100%; 
      max-width: 300px; /* 必要なら最大幅を指定 */
    }
  </style>
</head>

<body>
	<h2>お問い合わせフォーム</h2>
	<form th:action="@{/form}" method="post" th:object="${contactForm}">
		<div class="form-group">
			<label for="name">お名前</label>
			<input type="text" th:field="*{name}"><br>
			<div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color: red;"></div>
		</div>

		<div class="form-group">
		<label for="email">メールアドレス</label>
		<input type="text" th:field="*{email}"><br>
		<div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: red;"></div>
		</div>

		
		<div class="form-group">
		<label for="message">お問い合わせ内容</label>
		<textarea th:field="*{message}" cols="30" rows="10"></textarea><br>
		<div th:if="${#fields.hasErrors('message')}" th:errors="*{message}" style="color: red;"></div>
		</div>
		
	    <button type="submit">送信</button>
	</form>	
	
</body>
</html>
