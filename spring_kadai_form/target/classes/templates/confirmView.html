<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>問い合わせフォーム課題のページ</title>
<style>
    table {
        border: 1px solid black; /* 外側の枠線 */
    }
    th, td {
        border: 1px solid black; /* セルごとの枠線 */
        padding: 5px 10px;       /* セル内の余白 */
		
		    th {
		        text-align: center;
		    }
		    td {
		        text-align: left;
		    }
    }
</style>
</head>

<body>
	<h2>入力内容をご確認ください。</h2>
	<table>
	  <tr>
	    <th>項目</th>
	    <th>入力内容</th>
	  </tr>
	  <tr>
	    <td>お名前</td>
		<td th:text="${contactForm.getName()}"></td>
	  </tr>
	  <tr>
	    <td>メールアドレス</td>
		<td th:text="${contactForm.getEmail()}"></td>
	  </tr>
	  <tr>
	    <td>お問い合わせ内容</td>
		<td th:text="${contactForm.getMessage()}"></td>
	  </tr>
	</table>
</body>
</html>
